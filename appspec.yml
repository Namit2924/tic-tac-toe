version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/tictactoe

permissions:
  - object: /var/www/tictactoe
    owner: apache
    group: apache
    mode: 755
    type:
      - directory
      - file

hooks:
  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: root